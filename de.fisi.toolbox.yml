app-id: de.fisi.toolbox
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: fisi-toolbox

finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.secrets

modules:
  - name: python3-pyqt6
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app PyQt6 psutil
    sources:
      - type: file
        path: requirements.txt

  - name: fisi-toolbox
    buildsystem: simple
    build-commands:
      - install -Dm755 main.py /app/bin/fisi-toolbox
      - cp -r modules /app/bin/modules
      - cp -r ui /app/bin/ui
    sources:
      - type: dir
        path: .
